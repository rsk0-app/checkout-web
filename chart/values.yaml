replicaCount: 2
image:
  repository: ghcr.io/rsk0-app/checkout-web
  tag: "latest"
  pullPolicy: Always
service:
  port: 80
  targetPort: 3000
resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
env:
  NODE_ENV: production
failure:
  mode: ""
  errorRate: "0.5"
  latencyMs: "1500"
